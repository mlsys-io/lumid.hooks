name: security

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Zizmor (workflow audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.11.8"
      - name: Run zizmor
        run: uvx --from zizmor==1.24.1 zizmor --persona pedantic --format github .github/workflows

  gitleaks:
    name: Gitleaks (secrets scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # gitleaks scans the full git history for secrets; needs the
          # repo's commit graph, not just the tip.
          fetch-depth: 0
          persist-credentials: false
      - name: Run gitleaks
        # Binary, not gitleaks-action — the action gates on a paid license for org repos.
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-banner

  bandit:
    name: Bandit (Python source audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.11.8"
      - name: Run bandit
        run: uvx bandit==1.9.4 -c pyproject.toml -r src/ scripts/

  pip-audit:
    name: pip-audit (dependency CVE scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.11.8"
      - name: Generate frozen requirements
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt > /tmp/requirements.txt
      - name: Run pip-audit
        run: uvx pip-audit==2.9.0 --strict -r /tmp/requirements.txt
